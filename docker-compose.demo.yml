# MedGuard360 — demo subset (laptop-friendly, ~6 GB RAM)
#
# Includes only the services needed for the killer-demo flow:
#   auth-service, patient-service, prior-auth-service, claims-service,
#   fraud-engine-service, state-config-service, audit-log-service,
#   reporting-service, denial-service, provider-service, notification-service,
#   crisis-service
# Plus the 2 most-impressive AI engines: fraud-detection, pa-nlp-matcher
# Plus infra: postgres, redis, kafka, minio, nginx, portals
#
# Host port overrides avoid clashes with other local stacks (e.g. GeniusEye on 5432/6379/3000).
# Access: UI http://localhost/ (nginx) or http://localhost:3080/ (portals direct), API http://localhost/api/

x-node-build: &node-build
  context: .
  dockerfile: infrastructure/docker/Dockerfile.node

x-py-build: &py-build
  context: .
  dockerfile: infrastructure/docker/Dockerfile.python

x-service-env: &service-env
  NODE_ENV: ${NODE_ENV:-development}
  PG_HOST: postgres
  PG_PORT: "5432"
  PG_DATABASE: medguard360
  PG_USER: medguard
  PG_PASSWORD: ${PG_PASSWORD:-demo-password-not-for-prod}
  PG_POOL_MAX: "20"
  PG_SSL: "false"
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  KAFKA_BROKERS: kafka:9092
  JWT_SECRET: ${JWT_SECRET:-demo-jwt-secret-32-chars-minimum-rotate-me}
  JWT_ISSUER: medguard360
  JWT_AUDIENCE: medguard360-platform
  JWT_ACCESS_TTL_SEC: "900"
  JWT_REFRESH_TTL_SEC: "604800"
  MINIO_ENDPOINT: minio
  MINIO_PORT: "9000"
  MINIO_SSL: "false"
  MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-medguard}
  MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-medguard-demo-password}

x-deps: &deps
  postgres: { condition: service_healthy }
  redis: { condition: service_started }
  kafka: { condition: service_healthy }
  kafka-init:
    condition: service_completed_successfully

x-node-service: &node-service
  restart: unless-stopped
  depends_on: *deps

services:
  # -------- Infrastructure --------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: medguard360
      POSTGRES_USER: medguard
      POSTGRES_PASSWORD: ${PG_PASSWORD:-demo-password-not-for-prod}
    ports: ["5433:5432"]
    volumes:
      - demo-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medguard -d medguard360"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports: ["6380:6379"]

  kafka:
    image: apache/kafka:3.7.2
    ports: ["9092:9092"]
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: controller,broker
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "medguard360-kafka-cluster"
    volumes: [demo-kafkadata:/var/lib/kafka/data]
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 30s

  kafka-init:
    image: apache/kafka:3.7.2
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        KT=/opt/kafka/bin/kafka-topics.sh
        topics="user.created user.login.succeeded user.login.failed user.logout user.permission.changed claim.submitted claim.validated claim.adjudicated claim.paid claim.denied claim.appealed pa.requested pa.criteria.evaluated pa.approved pa.denied pa.needs.more.info pa.decided credentialing.application.received credentialing.psv.completed credentialing.approved credentialing.denied credentialing.expiring fraud.score.computed fraud.flag.raised fraud.alert.raised fraud.ring.detected fraud.case.opened fraud.case.escalated fraud.case.resolved clinical.encounter.started clinical.encounter.completed clinical.note.created clinical.code.suggested crisis.plan.created crisis.alert.raised crisis.responder.dispatched eligibility.checked notification.email.requested notification.sms.requested notification.push.requested denial.appeal.submitted audit.event provider.created provider.status.changed dme.order.created dme.order.status.changed nemt.trip.scheduled nemt.trip.completed hie.referral.created hie.consent.granted hie.consent.revoked patient.created patient.updated"
        for topic in $$topics; do
          $$KT --bootstrap-server kafka:9092 --create --if-not-exists --topic "$$topic" --partitions 1 --replication-factor 1 >/dev/null
          echo "  ✓ $$topic"
        done
        echo "Kafka demo topics ready"

  minio:
    image: minio/minio:latest
    ports: ["9000:9000", "9001:9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-medguard}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-medguard-demo-password}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 5

  bootstrap:
    image: alpine:3.20
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      kafka-init:
        condition: service_completed_successfully
      minio: { condition: service_healthy }
    volumes:
      - ./infrastructure:/work/infrastructure:ro
      - ./deploy:/work/deploy:ro
      - ./infrastructure/docker/bootstrap.sh:/bootstrap.sh:ro
    environment:
      <<: *service-env
      MINIO_URL: http://minio:9000
    entrypoint: ["sh", "-c", "/bootstrap.sh && PGPASSWORD=$$PG_PASSWORD psql -h postgres -U medguard -d medguard360 -f /work/deploy/seed-demo.sql"]

  # -------- 12 demo services --------
  auth-service:
    build: { <<: *node-build, args: { SERVICE_NAME: auth-service } }
    environment: { <<: *service-env, PORT: "3001" }
    ports: ["3001:3001"]
    <<: *node-service

  provider-service:
    build: { <<: *node-build, args: { SERVICE_NAME: provider-service } }
    environment: { <<: *service-env, PORT: "3002" }
    ports: ["3002:3002"]
    <<: *node-service

  patient-service:
    build: { <<: *node-build, args: { SERVICE_NAME: patient-service } }
    environment: { <<: *service-env, PORT: "3004" }
    ports: ["3004:3004"]
    <<: *node-service

  prior-auth-service:
    build: { <<: *node-build, args: { SERVICE_NAME: prior-auth-service } }
    environment: { <<: *service-env, PORT: "3006" }
    ports: ["3006:3006"]
    <<: *node-service

  claims-service:
    build: { <<: *node-build, args: { SERVICE_NAME: claims-service } }
    environment: { <<: *service-env, PORT: "3008" }
    ports: ["3008:3008"]
    <<: *node-service

  fraud-engine-service:
    build: { <<: *node-build, args: { SERVICE_NAME: fraud-engine-service } }
    environment: { <<: *service-env, PORT: "3009" }
    ports: ["3009:3009"]
    <<: *node-service

  denial-service:
    build: { <<: *node-build, args: { SERVICE_NAME: denial-service } }
    environment: { <<: *service-env, PORT: "3010" }
    ports: ["3010:3010"]
    <<: *node-service

  crisis-service:
    build: { <<: *node-build, args: { SERVICE_NAME: crisis-service } }
    environment: { <<: *service-env, PORT: "3014" }
    ports: ["3014:3014"]
    <<: *node-service

  reporting-service:
    build: { <<: *node-build, args: { SERVICE_NAME: reporting-service } }
    environment: { <<: *service-env, PORT: "3016" }
    ports: ["3016:3016"]
    <<: *node-service

  notification-service:
    build: { <<: *node-build, args: { SERVICE_NAME: notification-service } }
    environment: { <<: *service-env, PORT: "3017" }
    ports: ["3017:3017"]
    <<: *node-service

  state-config-service:
    build: { <<: *node-build, args: { SERVICE_NAME: state-config-service } }
    environment: { <<: *service-env, PORT: "3018" }
    ports: ["3018:3018"]
    <<: *node-service

  audit-log-service:
    build: { <<: *node-build, args: { SERVICE_NAME: audit-log-service } }
    environment: { <<: *service-env, PORT: "3019" }
    ports: ["3019:3019"]
    <<: *node-service

  # -------- 2 AI engines (demo) --------
  fraud-detection:
    build: { <<: *py-build, args: { ENGINE_NAME: fraud-detection } }
    environment:
      <<: *service-env
      PORT: "8004"
      # Use the trained numpy-only artifact we ship in the repo
      MODEL_PATH: /app/ai-engines/fraud-detection/models/fraud_v1_minimal.pkl
      MODEL_KIND: minimal
    ports: ["8004:8004"]

  pa-nlp-matcher:
    build: { <<: *py-build, args: { ENGINE_NAME: pa-nlp-matcher } }
    environment: { <<: *service-env, PORT: "8006", SKIP_WARMUP: "1" }
    ports: ["8006:8006"]

  # -------- Gateway + Frontend --------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./infrastructure/docker/nginx.demo.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth-service
      - patient-service
      - prior-auth-service
      - claims-service
      - fraud-engine-service
      - state-config-service
      - audit-log-service
      - reporting-service

  portals:
    build:
      context: .
      dockerfile: infrastructure/docker/Dockerfile.portals
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE: /api
    ports: ["3080:3000"]
    depends_on: [nginx]

volumes:
  demo-pgdata:
  demo-kafkadata:
