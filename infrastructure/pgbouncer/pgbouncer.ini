; MedGuard360 — PgBouncer config (production)
;
; PgBouncer sits in front of the Postgres primary on port 6432 and pools
; connections in transaction mode. Every Node service points at this instead
; of the primary directly. CLAUDE.md calls it out for high-traffic services.

[databases]
medguard360 = host=postgres port=5432 dbname=medguard360 auth_user=medguard pool_size=50
medguard360_ro = host=postgres-replica-1 port=5432 dbname=medguard360 auth_user=medguard pool_size=100

[pgbouncer]
listen_addr = 0.0.0.0
listen_port = 6432

; Transaction pooling — clients see one logical connection, server-side
; connections are released between transactions. Works with most app code
; except features that depend on session state (prepared statements,
; SET LOCAL, LISTEN/NOTIFY) — those need session pooling or have to be
; rewritten. withRlsContext() uses SET LOCAL inside a transaction so it's fine.
pool_mode = transaction
max_client_conn = 5000
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 10
reserve_pool_timeout = 5
server_lifetime = 3600
server_idle_timeout = 600
query_timeout = 60
query_wait_timeout = 30
client_idle_timeout = 0

; Auth — md5 (Postgres protocol). userlist.txt is generated from /opt/credential-vault/pgbouncer-users.json
auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt

; Admin
admin_users = pgbouncer_admin
stats_users = pgbouncer_admin, medguard

; Logging — structured to stdout for Logstash ingestion
log_connections = 1
log_disconnections = 0
log_pooler_errors = 1
verbose = 0

; TLS — backend connections to Postgres
server_tls_sslmode = verify-ca
server_tls_ca_file = /etc/pgbouncer/postgres-ca.crt
