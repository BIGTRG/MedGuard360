# Demo-mode nginx — routes the demo subset services.
worker_processes auto;
events { worker_connections 4096; }

http {
  # Docker embedded DNS — required for variable proxy_pass re-resolve after container recreate.
  resolver 127.0.0.11 ipv6=off;

  server {
    listen 80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Authorization $http_authorization;
    proxy_read_timeout 60s;

    # Prefix routes (^~) match with or without trailing slash.
    # Variable proxy_pass forces DNS re-resolve when backend containers are recreated.
    location ^~ /api/v1/auth/ {
      set $upstream http://auth-service:3001;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/providers {
      set $upstream http://provider-service:3002;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/credentialing {
      set $upstream http://credentialing-service:3003;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/clinical-doc {
      set $upstream http://clinical-doc-service:3007;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/patients {
      set $upstream http://patient-service:3004;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/prior-auth {
      set $upstream http://prior-auth-service:3006;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/claims {
      set $upstream http://claims-service:3008;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/fraud {
      set $upstream http://fraud-engine-service:3009;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/pharmacy {
      set $upstream http://pharmacy-service:3011;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/dme {
      set $upstream http://dme-service:3012;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/nemt {
      set $upstream http://nemt-service:3013;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/denials {
      set $upstream http://denial-service:3010;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/appeals {
      set $upstream http://denial-service:3010;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/crisis {
      set $upstream http://crisis-service:3014;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/reporting {
      set $upstream http://reporting-service:3016;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/notifications {
      set $upstream http://notification-service:3017;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/state-config {
      set $upstream http://state-config-service:3018;
      proxy_pass $upstream;
    }
    location ^~ /api/v1/audit {
      set $upstream http://audit-log-service:3019;
      proxy_pass $upstream;
    }

    location / {
      set $portals_upstream http://portals:3000;
      proxy_pass $portals_upstream;
    }
  }
}
