# Demo-mode nginx — routes only the 12 services in the demo subset.
worker_processes auto;
events { worker_connections 4096; }

http {
  resolver 127.0.0.11 ipv6=off;

  upstream auth_service         { server auth-service:3001; }
  upstream provider_service     { server provider-service:3002; }
  upstream patient_service      { server patient-service:3004; }
  upstream prior_auth_service   { server prior-auth-service:3006; }
  upstream claims_service       { server claims-service:3008; }
  upstream fraud_engine_service { server fraud-engine-service:3009; }
  upstream denial_service       { server denial-service:3010; }
  upstream crisis_service       { server crisis-service:3014; }
  upstream reporting_service    { server reporting-service:3016; }
  upstream notification_service { server notification-service:3017; }
  upstream state_config_service { server state-config-service:3018; }
  upstream audit_log_service    { server audit-log-service:3019; }

  server {
    listen 80;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;

    location /api/v1/auth/         { proxy_pass http://auth_service; }
    location /api/v1/providers/    { proxy_pass http://provider_service; }
    location /api/v1/patients/     { proxy_pass http://patient_service; }
    location /api/v1/prior-auth/   { proxy_pass http://prior_auth_service; }
    location /api/v1/claims/       { proxy_pass http://claims_service; }
    location /api/v1/fraud/        { proxy_pass http://fraud_engine_service; }
    location /api/v1/denials/      { proxy_pass http://denial_service; }
    location /api/v1/appeals/      { proxy_pass http://denial_service; }
    location /api/v1/crisis/       { proxy_pass http://crisis_service; }
    location /api/v1/reporting/    { proxy_pass http://reporting_service; }
    location /api/v1/notifications/{ proxy_pass http://notification_service; }
    location /api/v1/state-config/ { proxy_pass http://state_config_service; }
    location /api/v1/audit/        { proxy_pass http://audit_log_service; }

    # Portal app (proxied through nginx for same-origin /api calls)
    location / { proxy_pass http://portals:3000; }
  }
}
