# MedGuard360 — nginx reverse-proxy snippet.
# Drop into /etc/nginx/sites-available/medguard360.conf
# (or wherever your nginx vhost configs live), then `nginx -t && nginx -s reload`.
#
# Assumes:
#   - Your existing nginx is on the host (not in a container)
#   - You've got Let's Encrypt or commercial certs already provisioned
#   - MedGuard360 stack is on 127.0.0.1:8090

upstream medguard360 {
    server 127.0.0.1:8090;
    keepalive 32;
}

# HTTP → HTTPS redirect
server {
    listen 80;
    listen [::]:80;
    server_name medguard360.geniuseye.ai;     # ← change this
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name medguard360.geniuseye.ai;     # ← change this

    # TLS — point at your existing certs
    ssl_certificate     /etc/letsencrypt/live/medguard360.geniuseye.ai/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/medguard360.geniuseye.ai/privkey.pem;
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # Body size — clinical docs can be large
    client_max_body_size 100m;

    # Logging
    access_log /var/log/nginx/medguard360.access.log;
    error_log  /var/log/nginx/medguard360.error.log warn;

    # Proxy everything to the MedGuard360 internal gateway
    location / {
        proxy_pass http://medguard360;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header Connection "";
        proxy_read_timeout 120s;       # AI engines can be slow
        proxy_connect_timeout 5s;
    }

    # Per-zone rate limiting on auth (defense against credential stuffing)
    location /api/v1/auth/ {
        limit_req zone=auth_zone burst=20 nodelay;
        proxy_pass http://medguard360;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

# Add to your http {} block once:
#   limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/s;
