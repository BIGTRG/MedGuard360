# MedGuard360 — nginx reverse proxy
# Per CLAUDE.md: TLS 1.3 ONLY, rate limiting on, security headers, multi-portal routing.

user www-data;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---- Logging (structured JSON for ELK) ----
    log_format json_combined escape=json
      '{'
        '"time":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$request_id",'
        '"method":"$request_method",'
        '"uri":"$request_uri",'
        '"status":$status,'
        '"bytes_sent":$body_bytes_sent,'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent",'
        '"upstream":"$upstream_addr",'
        '"upstream_response_time":"$upstream_response_time",'
        '"request_time":$request_time'
      '}';
    access_log /var/log/nginx/access.log json_combined;
    error_log /var/log/nginx/error.log warn;

    # ---- Performance ----
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # ---- TLS 1.3 only ----
    ssl_protocols TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256:TLS_AES_128_GCM_SHA256;
    ssl_session_cache shared:SSL:50m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ---- Compression ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/x-font-ttf font/opentype image/svg+xml;

    # ---- Rate limiting zones ----
    # General API: 100 req/sec per IP, burst 200
    limit_req_zone $binary_remote_addr zone=api_general:50m rate=100r/s;
    # Auth endpoints: 10 req/sec per IP, burst 20 — brute-force defense
    limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/s;
    # Claim submission: 50 req/sec per authenticated user
    limit_req_zone $http_x_user_id zone=api_claims:50m rate=50r/s;
    limit_req_status 429;

    # ---- Security headers (applied to all responses) ----
    map $sent_http_content_type $csp_value {
        default "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'";
    }

    # ---- Upstream pools (one per microservice) ----
    upstream auth_service          { least_conn; server 127.0.0.1:3001; keepalive 32; }
    upstream provider_service      { least_conn; server 127.0.0.1:3002; keepalive 32; }
    upstream credentialing_service { least_conn; server 127.0.0.1:3003; keepalive 32; }
    upstream patient_service       { least_conn; server 127.0.0.1:3004; keepalive 32; }
    upstream eligibility_service   { least_conn; server 127.0.0.1:3005; keepalive 32; }
    upstream prior_auth_service    { least_conn; server 127.0.0.1:3006; keepalive 32; }
    upstream clinical_doc_service  { least_conn; server 127.0.0.1:3007; keepalive 32; }
    upstream claims_service        { least_conn; server 127.0.0.1:3008; keepalive 32; }
    upstream fraud_engine_service  { least_conn; server 127.0.0.1:3009; keepalive 32; }
    upstream denial_service        { least_conn; server 127.0.0.1:3010; keepalive 32; }
    upstream pharmacy_service      { least_conn; server 127.0.0.1:3011; keepalive 32; }
    upstream dme_service           { least_conn; server 127.0.0.1:3012; keepalive 32; }
    upstream nemt_service          { least_conn; server 127.0.0.1:3013; keepalive 32; }
    upstream crisis_service        { least_conn; server 127.0.0.1:3014; keepalive 32; }
    upstream hub_service           { least_conn; server 127.0.0.1:3015; keepalive 32; }
    upstream reporting_service     { least_conn; server 127.0.0.1:3016; keepalive 32; }
    upstream notification_service  { least_conn; server 127.0.0.1:3017; keepalive 32; }
    upstream state_config_service  { least_conn; server 127.0.0.1:3018; keepalive 32; }
    upstream audit_log_service     { least_conn; server 127.0.0.1:3019; keepalive 32; }
    upstream hie_service           { least_conn; server 127.0.0.1:3020; keepalive 32; }

    # ---- HTTP → HTTPS redirect ----
    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ---- API gateway (api.medguard360.com) ----
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name api.medguard360.com;

        ssl_certificate     /etc/letsencrypt/live/api.medguard360.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.medguard360.com/privkey.pem;

        # Security headers
        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "geolocation=(self), camera=(self), microphone=(self)" always;
        add_header Content-Security-Policy $csp_value always;

        # Pass request-id to upstream and back to client
        add_header X-Request-Id $request_id always;

        client_max_body_size 50m;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;

        # ----- Routing -----
        location /api/v1/auth/         { limit_req zone=api_auth   burst=20  nodelay; proxy_pass http://auth_service; }
        location /api/v1/providers/    { limit_req zone=api_general burst=200 nodelay; proxy_pass http://provider_service; }
        location /api/v1/credentialing/ { limit_req zone=api_general burst=200 nodelay; proxy_pass http://credentialing_service; }
        location /api/v1/patients/     { limit_req zone=api_general burst=200 nodelay; proxy_pass http://patient_service; }
        location /api/v1/eligibility/  { limit_req zone=api_general burst=200 nodelay; proxy_pass http://eligibility_service; }
        location /api/v1/prior-auth/   { limit_req zone=api_general burst=200 nodelay; proxy_pass http://prior_auth_service; }
        location /api/v1/clinical-doc/ { limit_req zone=api_general burst=200 nodelay; proxy_pass http://clinical_doc_service; }
        location /api/v1/claims/       { limit_req zone=api_claims  burst=100 nodelay; proxy_pass http://claims_service; }
        location /api/v1/fraud/        { limit_req zone=api_general burst=200 nodelay; proxy_pass http://fraud_engine_service; }
        location /api/v1/denials/      { limit_req zone=api_general burst=200 nodelay; proxy_pass http://denial_service; }
        location /api/v1/pharmacy/     { limit_req zone=api_general burst=200 nodelay; proxy_pass http://pharmacy_service; }
        location /api/v1/dme/          { limit_req zone=api_general burst=200 nodelay; proxy_pass http://dme_service; }
        location /api/v1/nemt/         { limit_req zone=api_general burst=200 nodelay; proxy_pass http://nemt_service; }
        location /api/v1/crisis/       { limit_req zone=api_general burst=200 nodelay; proxy_pass http://crisis_service; }
        location /api/v1/hub/          { limit_req zone=api_general burst=200 nodelay; proxy_pass http://hub_service; }
        location /api/v1/reporting/    { limit_req zone=api_general burst=200 nodelay; proxy_pass http://reporting_service; }
        location /api/v1/notifications/ { limit_req zone=api_general burst=200 nodelay; proxy_pass http://notification_service; }
        location /api/v1/state-config/ { limit_req zone=api_general burst=200 nodelay; proxy_pass http://state_config_service; }
        location /api/v1/hie/          { limit_req zone=api_general burst=200 nodelay; proxy_pass http://hie_service; }

        # Block any non-routed path
        location / { return 404; }
    }

    # ---- Portal hosts (one cert per portal) ----
    # Pattern: <portal>.medguard360.com → static Next.js build served by Node.
    # Each role-portal gets its own server block in a separate file under
    # /etc/nginx/conf.d/portals/*.conf to keep this file readable.
    include /etc/nginx/conf.d/portals/*.conf;
}
