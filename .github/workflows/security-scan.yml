name: Security scan

on:
  push:
    branches: [main, develop]
  pull_request:
  schedule:
    - cron: '0 6 * * 1'   # Monday 6am UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: |
            packages/shared/package-lock.json
            frontend/portals/package-lock.json
      - name: Audit shared package
        working-directory: packages/shared
        run: npm ci && npm audit --audit-level=high
        continue-on-error: true
      - name: Audit portals
        working-directory: frontend/portals
        run: npm ci && npm audit --audit-level=high
        continue-on-error: true

  semgrep:
    name: SAST (semgrep)
    runs-on: ubuntu-latest
    container: returntocorp/semgrep
    steps:
      - uses: actions/checkout@v4
      - run: semgrep --config=p/owasp-top-ten --config=p/typescript --config=p/python --error
        continue-on-error: true

  trivy:
    name: container image scan
    runs-on: ubuntu-latest
    permissions:
      packages: read
    strategy:
      fail-fast: false
      matrix:
        image: [auth-service, claims-service, fraud-engine-service, prior-auth-service, portals]
    steps:
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ghcr.io/bigtrg/medguard360/${{ matrix.image }}:latest
          severity: CRITICAL,HIGH
          exit-code: '0'
          format: table

  gitleaks:
    name: secrets scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
