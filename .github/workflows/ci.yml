name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-and-typecheck:
    name: build shared package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/shared/package-lock.json
      - name: Install and build shared package
        working-directory: packages/shared
        run: npm ci && npm run build && npm test

  script-encoding:
    name: deploy static checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: chmod +x deploy/check-script-encoding.sh && ./deploy/check-script-encoding.sh
      - run: chmod +x deploy/check-claims-rls-policy.sh && ./deploy/check-claims-rls-policy.sh

  unit-tests:
    name: jest (Node services)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env: { POSTGRES_PASSWORD: test, POSTGRES_DB: medguard360_test }
        ports: ['5432:5432']
        options: >-
          --health-cmd "pg_isready -U postgres -d medguard360_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: packages/shared/package-lock.json
      - run: cd packages/shared && npm ci && npm run build
      - run: cd packages/shared && npm test
      - run: |
          while IFS= read -r svc; do
            [ -z "$svc" ] && continue
            case "$svc" in \#*) continue ;; esac
            (cd "services/$svc" && npm install && npm test) || exit 1
          done < deploy/ci-node-services.txt
        env:
          JWT_SECRET: test-secret-min-32-chars-1234567890ab
          PG_HOST: localhost
          PG_PASSWORD: test
          PG_DATABASE: medguard360_test

  python-tests:
    name: pytest (optional AI engines)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        engine: [clinical-nlp, eligibility-intel, provider-monitor, ocr-engine, fraud-ring-gnn, speech-to-text]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install deps
        working-directory: ai-engines/${{ matrix.engine }}
        run: pip install -r requirements.txt
        continue-on-error: ${{ matrix.engine == 'speech-to-text' || matrix.engine == 'fraud-ring-gnn' }}
      - name: pytest
        working-directory: ai-engines/${{ matrix.engine }}
        run: pytest -q || true

  pytest-demo-engines:
    name: pytest (demo AI engines)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      - name: Install and test demo engines
        run: |
          while IFS= read -r engine; do
            [ -z "$engine" ] && continue
            case "$engine" in \#*) continue ;; esac
            echo "==> $engine"
            pip install -r "ai-engines/$engine/requirements.txt"
            (cd "ai-engines/$engine" && SKIP_WARMUP=1 pytest -q)
          done < deploy/ci-demo-engines.txt

  frontend-build:
    name: Next.js build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/portals/package-lock.json
      - run: cd frontend/portals && npm ci && npm run lint && npm run typecheck && npm run build
        env:
          NEXT_PUBLIC_API_BASE: /api
