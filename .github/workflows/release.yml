name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: Version tag (e.g. v1.0.1-demo)
        required: true

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: build + push container images
    runs-on: ubuntu-latest
    permissions: { contents: read, packages: write }
    strategy:
      fail-fast: false
      matrix:
        target:
          # Node services
          - { kind: node,    name: auth-service }
          - { kind: node,    name: provider-service }
          - { kind: node,    name: credentialing-service }
          - { kind: node,    name: patient-service }
          - { kind: node,    name: eligibility-service }
          - { kind: node,    name: prior-auth-service }
          - { kind: node,    name: clinical-doc-service }
          - { kind: node,    name: claims-service }
          - { kind: node,    name: fraud-engine-service }
          - { kind: node,    name: denial-service }
          - { kind: node,    name: pharmacy-service }
          - { kind: node,    name: dme-service }
          - { kind: node,    name: nemt-service }
          - { kind: node,    name: crisis-service }
          - { kind: node,    name: hub-service }
          - { kind: node,    name: reporting-service }
          - { kind: node,    name: notification-service }
          - { kind: node,    name: state-config-service }
          - { kind: node,    name: audit-log-service }
          - { kind: node,    name: hie-service }
          # AI engines
          - { kind: python,  name: speech-to-text }
          - { kind: python,  name: clinical-nlp }
          - { kind: python,  name: ocr-engine }
          - { kind: python,  name: fraud-detection }
          - { kind: python,  name: fraud-ring-gnn }
          - { kind: python,  name: pa-nlp-matcher }
          - { kind: python,  name: denial-predictor }
          - { kind: python,  name: provider-monitor }
          - { kind: python,  name: crisis-detector }
          - { kind: python,  name: eligibility-intel }
          # Frontend
          - { kind: portals, name: portals }
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image prefix (GHCR requires lowercase)
        id: image
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "prefix=${{ env.REGISTRY }}/${owner}/medguard360" >> "$GITHUB_OUTPUT"

      - name: Resolve version
        id: ver
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: "Build & push (${{ matrix.target.kind }} :: ${{ matrix.target.name }})"
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infrastructure/docker/Dockerfile.${{ matrix.target.kind }}
          build-args: |
            SERVICE_NAME=${{ matrix.target.kind == 'node' && matrix.target.name || '' }}
            ENGINE_NAME=${{ matrix.target.kind == 'python' && matrix.target.name || '' }}
          tags: |
            ${{ steps.image.outputs.prefix }}/${{ matrix.target.name }}:${{ steps.ver.outputs.tag }}
            ${{ steps.image.outputs.prefix }}/${{ matrix.target.name }}:latest
          push: true
          cache-from: type=gha,scope=${{ matrix.target.name }}
          cache-to: type=gha,scope=${{ matrix.target.name }},mode=max

  github-release:
    name: publish GitHub release
    if: github.event_name == 'push'
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: MedGuard360 ${{ github.ref_name }}
          body_path: deploy/DEMO-RELEASE-NOTES.md
          generate_release_notes: true
          make_latest: true
          overwrite: true
